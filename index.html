<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Website Auditor</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="header">

        <div class="logo">
            <i class="fas fa-chart-line"></i>
        </div>

        <h1>Portfolio Website Auditor</h1>

        <p>
            Analyze SEO, Performance, Mobile Friendliness and UI/UX
        </p>

    </div>

    <div class="audit-card">

        <h2>Website Audit</h2>

        <input
            type="text"
            id="websiteUrl"
            placeholder="https://yourportfolio.com"
        >

        <button id="auditBtn">
            <i class="fas fa-search"></i>
            Audit Website
        </button>

    </div>

    <div class="results">

        <div class="score-card">

            <i class="fas fa-search"></i>

            <h3>SEO Score</h3>

            <span id="seoScore">0</span>

        </div>

        <div class="score-card">

            <i class="fas fa-bolt"></i>

            <h3>Performance</h3>

            <span id="performanceScore">0</span>

        </div>

        <div class="score-card">

            <i class="fas fa-mobile-screen"></i>

            <h3>Mobile Friendly</h3>

            <span id="mobileScore">0</span>

        </div>

        <div class="score-card">

            <i class="fas fa-palette"></i>

            <h3>UI / UX</h3>

            <span id="uiScore">0</span>

        </div>

    </div>

    <div class="suggestions-card">

        <h2>Suggestions</h2>

        <ul id="suggestionsList">

            <li>
                Enter a website URL and run audit
            </li>

        </ul>

    </div>

    <footer>

        © 2026 Portfolio Website Auditor

    </footer>

</div>

<script src="js/app.js"></script>

</body>
</html>
